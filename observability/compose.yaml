name: claude-code-observability

# Claude Code のテレメトリをローカルだけで可視化するスタック。
#   Claude Code --OTLP/gRPC:4317--> otel-collector --:8889--> prometheus --> grafana(:3000)
# データは一切外部に出ない。すべて Docker 内で完結する。

services:
  # OTLP を受け取り、Prometheus が scrape できる形(/metrics)で再公開する
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    container_name: cc-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC … Claude Code はここに push する
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus 用 scrape エンドポイント
    restart: unless-stopped

  # 時系列メトリクスの保存先
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: cc-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"   # http://localhost:9090 で Prometheus UI
    restart: unless-stopped

  # 可視化。データソースとダッシュボードは provisioning で自動投入される
  grafana:
    image: grafana/grafana:11.5.0
    container_name: cc-grafana
    environment:
      # ローカル専用なので匿名 Admin を有効化（開いたらログイン不要で即見られる）
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: "dark"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"   # http://localhost:3000 で Grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
