receivers:
  # Claude Code から OTLP でメトリクスを受け取る
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Prometheus が scrape する /metrics を公開する
  prometheus:
    endpoint: 0.0.0.0:8889
    # _total / _USD / _tokens などのサフィックスを付けない。
    # これで claude_code.cost.usage -> claude_code_cost_usage と予測可能な名前になる
    add_metric_suffixes: false
    # service.name などのリソース属性をラベルとして引き継ぐ
    resource_to_telemetry_conversion:
      enabled: true
  # 受信状況をコンテナログで確認するためのデバッグ出力
  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
  telemetry:
    logs:
      level: info
