global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel Collector が公開する Claude Code のメトリクス
  - job_name: otel-collector
    static_configs:
      - targets: ["cc-otel-collector:8889"]

  # Prometheus 自身（疎通確認用）
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
