gui:
  theme:
    activeBorderColor:
      - white
      - bold
    inactiveBorderColor:
      - "#555555"
    selectedLineBgColor:
      - "#1e1e2e"
  showIcons: true
  nerdFontsVersion: "3"
  mouseEvents: true
  sidePanelWidth: 0.25
  expandFocusedSidePanel: true

git:
  paging:
    colorArg: always
    pager: delta --dark --paging=never
  branchLogCmd: git log --graph --color=always --abbrev-commit --decorate --date=relative --pretty=medium {{branchName}} --

keybinding:
  universal:
    quit: q
    return: <esc>
